version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep pip dependencies up to date
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep pre-commit hook revisions up to date
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
